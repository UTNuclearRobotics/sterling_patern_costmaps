version: '3.8'

services:
  sterling_patern_costmaps_s:
    image: sterling_patern_costmaps_i
    container_name: sterling_patern_costmaps_c
    build:
      context: ..
      dockerfile: docker/Dockerfile
      ssh:
        - default
    runtime: nvidia
    environment:
      - DISPLAY=${DISPLAY}
      - NVIDIA_DRIVER_CAPABILITIES=all
      - __NV_PRIME_RENDER_OFFLOAD=1
      - __GLX_VENDOR_LIBRARY_NAME=nvidia
      - QT_X11_NO_MITSHM=1
      - ROS_MASTER_URI=http://localhost:11311
      - ROS_HOSTNAME=localhost
    security_opt:
      - apparmor:unconfined
    volumes:
      - ../ros_ws:/root/ros_ws
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /dev/dri:/dev/dri
      - ${HOME}/.Xauthority:/root/.Xauthority:rw
    network_mode: host
    stdin_open: true
    tty: true
    entrypoint: /usr/bin/entrypoint.sh
