# global_costmap_params.yaml
global_costmap:
  global_frame: map
  robot_base_frame: base_footprint
  update_frequency: 1.0      # From global_costmap.update_frequency
  publish_frequency: 1.0     # From global_costmap.publish_frequency
  static_map: true           # Since static_layer is enabled
  rolling_window: false      # Global costmap typically uses a static map
  resolution: 0.05           # From global_costmap.resolution
  track_unknown_space: true  # From global_costmap.track_unknown_space
  use_maximum: false          # From global_costmap.use_maximum (used by global_costmap_builder)

  plugins:
    - {name: static_layer, type: "costmap_2d::StaticLayer"}
    - {name: sterling_layer, type: "costmap_2d::StaticLayer"}
    - {name: obstacle_layer, type: "costmap_2d::ObstacleLayer"}
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}

  static_layer:
    map_topic: "/map"             # From global_costmap.static_layer.map_topic
    subscribe_to_updates: true    # From global_costmap.static_layer.map_subscribe_transient_local

  sterling_layer:
    map_topic: "/sterling/global_costmap"     # From global_costmap.sterling_layer.map_topic
    subscribe_to_updates: true                # From global_costmap.sterling_layer.map_subscribe_transient_local