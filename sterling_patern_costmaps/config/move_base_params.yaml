# move_base_params.yaml
controller_frequency: 10.0  # From controller_server.controller_frequency
controller_patience: 15.0   # Default value, can be adjusted
planner_frequency: 1.0      # Matches global_costmap.update_frequency
planner_patience: 5.0       # Default value, can be adjusted
conservative_reset_dist: 3.0  # Default value, can be adjusted
recovery_behavior_enabled: true
clearing_rotation_allowed: true
oscillation_timeout: 0.0    # Disable oscillation detection (can be adjusted)
oscillation_distance: 0.5   # Default value, can be adjusted

# Base local planner (replacing DWBLocalPlanner from controller_server)
base_local_planner: "dwa_local_planner/DWAPlannerROS"
DWAPlannerROS:
  use_costmap_gradient: true  # From controller_server.FollowPath.use_costmap_gradient
  min_vel_x: 0.0             # From controller_server.FollowPath.min_vel_x
  min_vel_y: 0.0             # From controller_server.FollowPath.min_vel_y
  max_vel_x: 0.26            # From controller_server.FollowPath.max_vel_x
  max_vel_y: 0.0             # From controller_server.FollowPath.max_vel_y
  max_rot_vel: 1.0           # From controller_server.FollowPath.max_vel_theta
  min_rot_vel: 0.0           # From controller_server.FollowPath.min_speed_theta
  acc_lim_x: 2.5             # From controller_server.FollowPath.acc_lim_x
  acc_lim_y: 0.0             # From controller_server.FollowPath.acc_lim_y
  acc_lim_theta: 3.2         # From controller_server.FollowPath.acc_lim_theta
  max_trans_vel: 0.26        # From controller_server.FollowPath.max_speed_xy
  min_trans_vel: 0.0         # From controller_server.FollowPath.min_speed_xy
  yaw_goal_tolerance: 0.15   # From controller_server.goal_checker.yaw_goal_tolerance
  xy_goal_tolerance: 0.1     # From controller_server.goal_checker.xy_goal_tolerance
  latch_xy_goal_tolerance: true  # From controller_server.goal_checker.stateful
  sim_time: 2.5              # From controller_server.FollowPath.sim_time
  sim_granularity: 0.05      # From controller_server.FollowPath.linear_granularity
  angular_sim_granularity: 0.025  # From controller_server.FollowPath.angular_granularity
  vx_samples: 20             # From controller_server.FollowPath.vx_samples
  vth_samples: 20            # From controller_server.FollowPath.vtheta_samples
  path_distance_bias: 32.0   # From controller_server.FollowPath.PathDist.scale
  goal_distance_bias: 24.0   # From controller_server.FollowPath.GoalDist.scale
  occdist_scale: 0.02        # From controller_server.FollowPath.BaseObstacle.scale
  forward_point_distance: 0.1  # From controller_server.FollowPath.PathAlign.forward_point_distance
  stop_time_buffer: 0.5      # Default value, can be adjusted
  scaling_speed: 0.25        # From controller_server.FollowPath.trans_stopped_velocity
  max_scaling_factor: 0.2    # Default value, can be adjusted

# Global planner (replacing SmacPlanner2D from planner_server)
base_global_planner: "navfn/NavfnROS"
NavfnROS:
  allow_unknown: true        # From planner_server.GridBased.allow_unknown
  visualize_potential: false  # Default value, can be adjusted
  planner_window_x: 0.0      # Default value, can be adjusted
  planner_window_y: 0.0      # Default value, can be adjusted