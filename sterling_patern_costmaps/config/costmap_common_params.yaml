# costmap_common_params.yaml
obstacle_range: 2.0          # From global_costmap.obstacle_layer.obstacle_max_range
raytrace_range: 2.5          # From global_costmap.obstacle_layer.raytrace_max_range
footprint: [[-0.105, -0.105], [-0.105, 0.105], [0.041, 0.105], [0.041, -0.105]]
robot_radius: 0.55           # From local_costmap.inflation_layer.inflation_radius
inflation_radius: 0.55       # From local_costmap.inflation_layer.inflation_radius
cost_scaling_factor: 3.0     # From local_costmap.inflation_layer.cost_scaling_factor

observation_sources: scan
scan:
  data_type: LaserScan
  topic: scan  # From local_costmap.obstacle_layer.scan.topic
  marking: true              # From local_costmap.obstacle_layer.scan.marking
  clearing: true             # From local_costmap.obstacle_layer.scan.clearing
  obstacle_range: 2.0        # From local_costmap.obstacle_layer.scan.obstacle_max_range
  raytrace_range: 2.5        # From local_costmap.obstacle_layer.scan.raytrace_max_range